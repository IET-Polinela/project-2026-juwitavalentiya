{% extends 'base.html' %}

{% block content %}

<style>
    body {
        background: #ffe6f0;
    }

    .contact-card {
        max-width: 500px;
        margin: 50px auto;
        background: #fff0f6;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 8px 20px rgba(255, 105, 180, 0.2);
        font-family: 'Segoe UI', sans-serif;
    }

    .contact-title {
        text-align: center;
        color: #ff4d88;
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    label {
        color: #d63384;
        font-weight: 600;
    }

    .form-control {
        border-radius: 12px;
        border: 1px solid #ffb3d1;
        padding: 10px;
    }

    .form-control:focus {
        border-color: #ff4d88;
        box-shadow: 0 0 5px #ff99c2;
    }

    .btn-pink {
        background: linear-gradient(45deg, #ff4d88, #ff99c2);
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 12px;
        font-weight: bold;
        margin-top: 10px;
        transition: 0.3s;
    }

    .btn-pink:hover {
        transform: scale(1.05);
        background: linear-gradient(45deg, #ff3385, #ff66b2);
    }

    .emoji {
        text-align: center;
        font-size: 30px;
    }
</style>

<div class="contact-card">
    <div class="emoji">💖✨📩</div>
    <div class="contact-title">Contact Us</div>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Nama</label>
            <input type="text" name="nama" class="form-control" placeholder="Nama kamu...">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" placeholder="email@gmail.com">
        </div>

        <div class="mb-3">
            <label>Pesan</label>
            <textarea name="pesan" rows="4" class="form-control" placeholder="Tulis pesan kamu di sini..."></textarea>
        </div>

        <button type="submit" class="btn-pink">Kirim 💌</button>
    </form>
</div>

{% endblock %}
