<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Portal 24782014</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to bottom right, #ffe6f2, #f9e6ff);
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
        }

        .home-header {
            padding: 32px 0 16px;
        }

        .home-title {
            color: #d63384;
            font-weight: 700;
        }

        .dashboard-layout {
            min-height: calc(100vh - 32px);
            gap: 24px;
        }

        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #ff85c1, #ff69b4);
            color: white;
            border-radius: 30px;
            padding: 24px 18px;
            flex-shrink: 0;
        }

        .sidebar-brand {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .sidebar-link {
            display: block;
            color: rgba(255, 255, 255, 0.95);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 0.6rem;
            transition: background 0.2s ease;
            border: 1px solid transparent;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: rgba(255, 255, 255, 0.16);
        }

        .sidebar-footer {
            margin-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 1rem;
            font-size: 0.9rem;
        }

        .main-panel {
            flex: 1;
        }

        .app-shell {
            min-height: calc(100vh - 32px);
            gap: 24px;
            display: flex;
            align-items: flex-start;
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #ff5fb5, #ff8ad1);
            color: white;
            border-radius: 30px;
            padding: 28px 22px;
            flex-shrink: 0;
            box-shadow: 0 24px 60px rgba(255, 95, 181, 0.18);
        }

        .main-content {
            flex: 1;
            min-height: auto;
        }

        .sidebar-logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(255,255,255,0.12);
            border-radius: 18px;
            margin-bottom: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .sidebar-logo span {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(255,255,255,0.24);
            font-weight: 700;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.92);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 0.75rem;
            transition: background 0.25s ease;
            border: 1px solid transparent;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: rgba(255, 255, 255, 0.18);
        }

        .sidebar-cta {
            margin-top: 1.75rem;
        }

        .sidebar-cta .btn {
            width: 100%;
            border-radius: 18px;
            padding: 12px 18px;
            background: white;
            color: #d63384;
            font-weight: 700;
            border: none;
        }

        .sidebar-cta .btn:hover {
            background: #ffe6f2;
        }

        .status-summary {
            margin-top: 2rem;
        }

        .status-summary h6 {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .status-summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            margin-bottom: 0.75rem;
            color: #f5f8ff;
            font-size: 0.95rem;
        }

        .main-content {
            background: transparent;
            min-height: calc(100vh - 32px);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 24px;
        }

        .page-title {
            margin-bottom: 0.25rem;
            font-size: clamp(1.8rem, 2.2vw, 2.6rem);
            font-weight: 800;
            color: #d63384;
        }

        .page-subtitle {
            color: #7a4d75;
            max-width: 620px;
        }

        .logout-btn-top {
            min-width: 132px;
        }

        .tab-pill {
            border-radius: 24px;
            border: 1px solid rgba(156, 163, 175, 0.25);
            padding: 12px 20px;
            min-width: 150px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-pill.active {
            background: white;
            color: #0d3b8f;
            border-color: rgba(255, 255, 255, 0.40);
            box-shadow: 0 10px 30px rgba(12, 55, 143, 0.08);
        }

        .tab-pill:not(.active) {
            background: rgba(255, 255, 255, 0.6);
            color: #4b5563;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1.65fr 1fr;
            gap: 24px;
            align-items: start;
        }

        .report-list {
            display: grid;
            gap: 20px;
        }

        .report-card {
            border-radius: 24px;
            padding: 26px;
            background: white;
            box-shadow: 0 20px 40px rgba(148, 140, 186, 0.12);
            border: 1px solid rgba(229, 229, 255, 0.9);
        }

        .report-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
        }

        .report-card-title {
            margin-bottom: 0.5rem;
            font-size: 1.15rem;
            font-weight: 700;
            color: #1f1f47;
        }

        .report-card-meta {
            color: #6b6898;
            font-size: 0.95rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.85rem;
        }

        .report-card-body {
            color: #4b5563;
            margin-bottom: 18px;
        }

        .report-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .status-badge {
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .badge-reported { background: #eef2ff; color: #4338ca; }
        .badge-verified { background: #d1fae5; color: #166534; }
        .badge-inprogress { background: #fef3c7; color: #92400e; }
        .badge-resolved { background: #d1d5db; color: #1f2937; }
        .badge-draft { background: #f5f3ff; color: #5b21b6; }

        .action-buttons button {
            min-width: 80px;
        }

        .announcement-panel {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 18px 40px rgba(114, 93, 205, 0.10);
            padding: 24px;
        }

        .announcement-panel h5 {
            margin-bottom: 1rem;
            font-weight: 700;
            color: #1f1f47;
        }

        .announcement-card {
            border-radius: 20px;
            padding: 18px;
            border: 1px solid #eef2ff;
            margin-bottom: 1rem;
        }

        .announcement-card:last-child {
            margin-bottom: 0;
        }

        .announcement-title {
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: #0f172a;
        }

        .announcement-note {
            color: #6b7280;
            font-size: 0.95rem;
            margin-bottom: 0.75rem;
        }

        .announcement-meta {
            font-size: 0.84rem;
            color: #9ca3af;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .announcement-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 8px 11px;
            border-radius: 999px;
            background: #eef2ff;
            color: #1d4ed8;
            font-weight: 700;
            font-size: 0.82rem;
        }

        .announcement-badge {
            background: #e0f2fe;
            color: #0284c7;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .pagination-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 24px;
        }

        .pagination-pill {
            min-width: 42px;
            border-radius: 999px;
            padding: 10px 14px;
            border: 1px solid rgba(255, 99, 168, 0.25);
            background: rgba(255, 255, 255, 0.95);
            color: #d63384;
            font-weight: 700;
            transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
            cursor: pointer;
        }

        .pagination-pill:hover {
            transform: translateY(-1px);
            background: #ffe6f2;
        }

        .pagination-pill.active {
            background: #ff69b4;
            color: white;
            border-color: transparent;
            box-shadow: 0 12px 30px rgba(255, 105, 180, 0.18);
        }

        .pagination-pill.disabled {
            opacity: 0.45;
            cursor: default;
        }

        .app-shell {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .sidebar {
            width: 100%;
            max-width: 320px;
        }

        .main-content {
            min-height: auto;
            width: 100%;
        }

        .page-header {
            flex-direction: column;
            align-items: flex-start;
        }

        .logout-btn-top {
            width: 100%;
            max-width: 220px;
        }

        .tab-pill {
            width: auto;
            flex: 1 1 180px;
            text-align: center;
        }

        .content-grid {
            grid-template-columns: 1fr;
        }

        .announcement-panel {
            order: 2;
        }

        .report-list {
            order: 1;
        }

        .report-card-header,
        .report-card-footer {
            flex-direction: column;
            align-items: stretch;
        }

        .announcement-meta {
            flex-direction: column;
            align-items: flex-start;
        }

        @media (max-width: 992px) {
            .sidebar {
                max-width: 100%;
                margin-bottom: 16px;
            }

            .page-header {
                gap: 16px;
            }

            .tab-pill {
                min-width: 140px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                padding: 20px 18px;
            }

            .sidebar-logo {
                flex-direction: column;
                align-items: flex-start;
            }

            .sidebar-link {
                justify-content: center;
            }

            .sidebar-cta .btn {
                padding: 12px 14px;
            }

            .page-header {
                align-items: stretch;
            }

            .tab-pill {
                width: 100%;
                min-width: 0;
            }

            .status-summary-item {
                padding: 14px 12px;
            }

            .announcement-panel,
            .report-list {
                width: 100%;
            }

            .report-card {
                padding: 22px;
            }
        }

        .login-card .card-header {
            background: linear-gradient(90deg, #ff69b4, #ff85c1);
        }

        .report-table table {
            margin-bottom: 0;
        }

        .report-table thead th {
            background: linear-gradient(90deg, #ffcad4, #d8c4ff);
            color: #7a2c5b;
            font-weight: 600;
            border: none;
        }

        .report-table tbody tr:hover {
            background: #ffeaf4;
        }

        .text-pink {
            color: #d63384;
        }

        .btn-primary {
            background-color: #ff69b4;
            border-color: #ff69b4;
        }

        .btn-primary:hover {
            background-color: #ff4da6;
            border-color: #ff4da6;
        }

        .login-card .card-header {
            background: linear-gradient(90deg, #ff69b4, #ff85c1);
        }
    </style>
</head>
<body>

    <div class="container mt-4">
        <div id="app"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
